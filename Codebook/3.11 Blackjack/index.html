<!DOCTYPE html>

<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>JavaScript Blackjack</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
			</script>
		<link rel="stylesheet" href="style.css">
	</head>

	<body>
		<main>
			<div class="row mt-4">
				<div class="col-12 d-flex justify-content-center mt-4">
					<h1>Blackjack</h1>
				</div>
			</div>

			<div class="row playingfield">

				<div class="col-12 col-md-6 dealer">
					<h2>Dealer</h2>
					<p>Wins: <span id="dealer-wins">0</span></p>
					<div id="dealer-cards" class="cards"></div>
					<p>Score: <span id="dealer-score">0</span></p>
				</div>

				<div class="col-12 col-md-6 player">
					<h2>Player</h2>
					<p>Wins: <span id="player-wins">0</span></p>
					<div id="player-cards" class="cards"></div>
					<p>Score: <span id="player-score">0</span></p>
				</div>

			</div>

			<div class="row buttons">
				<div class="col-12 col-md-2 offset-md-4 d-flex justify-content-center">
					<button id="deal-button">Deal</button>
				</div>
				<div class="col-12 col-md-2 d-flex justify-content-center">
					<button disabled id="pass-button">Pass</button>
				</div>
			</div>

			<div class="row">
				<div class="col-12">
					<h2 id="message">Start a game by hitting Deal!</h2>
				</div>
			</div>
		</main>

		<script src="script.js"></script>
	</body>

</html>
